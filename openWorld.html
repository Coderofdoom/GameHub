<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zombie World — GameHub</title>
    <link rel="stylesheet" href="js/game-common.css" />
  </head>
  <body class="gh-game">
    <div class="gh-game-wrap" style="padding:0">
      <header class="gh-game-header">
        <h1>🧟 ZOMBIE WORLD</h1>
        <div class="gh-hud">
          <span>HP: <b id="hud-hp">100</b></span>
          <span>Kills: <b id="hud-kills">0</b></span>
          <span>Quest: <b id="hud-quest">Survive</b></span>
        </div>
        <a class="gh-back" href="Index.html">← Hub</a>
      </header>
      <canvas id="game" class="gh-canvas" style="width:100%;height:calc(100vh - 80px);border-radius:0"></canvas>
    </div>
    <script src="js/core/SaveManager.js"></script>
    <script src="js/core/XPManager.js"></script>
    <script src="js/core/AchievementManager.js"></script>
    <script src="js/core/ShopManager.js"></script>
    <script src="js/core/QuestManager.js"></script>
    <script src="js/core/BattlePassManager.js"></script>
    <script src="js/core/LeaderboardManager.js"></script>
    <script src="js/core/AudioManager.js"></script>
    <script src="js/core/GameBridge.js"></script>
    <script src="openWorld.js"></script>
  </body>
</html>
