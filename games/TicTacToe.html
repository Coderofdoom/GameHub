<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic Tac Toe — GameHub</title>
    <link rel="stylesheet" href="js/game-common.css" />
    <style>
      .ttt-board {
        display: grid;
        grid-template-columns: repeat(3, 100px);
        gap: 5px;
        margin: 40px auto;
        width: fit-content;
      }
      .ttt-cell {
        width: 100px;
        height: 100px;
        background: rgba(0, 247, 255, 0.1);
        border: 2px solid var(--cyan);
        border-radius: 10px;
        font-size: 3rem;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: 0.2s;
      }
      .ttt-cell:hover {
        background: rgba(0, 247, 255, 0.2);
      }
      .ttt-info {
        text-align: center;
        margin: 20px;
        font-size: 1.2rem;
      }
    </style>
  </head>
  <body class="gh-game">
    <div class="gh-game-wrap" style="text-align: center; padding: 20px">
      <header class="gh-game-header">
        <h1>⭕ TIC TAC TOE</h1>
        <div class="gh-hud">
          <span>Wins: <b id="score">0</b></span
          ><span>Losses: <b id="combo">0</b></span
          ><span>Coins: <b id="coins">0</b></span>
        </div>
        <a class="gh-back" href="Index.html">← Hub</a>
      </header>
      <div class="ttt-info" id="status">You (X) vs CPU (O)</div>
      <div class="ttt-board" id="board"></div>
      <button
        onclick="game.restart()"
        class="btn-primary"
        style="margin-top: 20px; display: none"
        id="restart-btn"
      >
        Play Again
      </button>
    </div>
    <script src="js/core/SaveManager.js"></script>
    <script src="js/core/GameBridge.js"></script>
    <script src="js/core/AudioManager.js"></script>
    <script src="js/core/UIManager.js"></script>
    <script src="js/games/TicTacToe.js"></script>
  </body>
</html>
